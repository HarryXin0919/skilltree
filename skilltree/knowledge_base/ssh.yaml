tool: ssh
description: 安全远程登录与隧道
nodes:
  - id: ssh.basic
    type: subcommand
    tier: basic
    invocation: "ssh user@host"
    desc: 登录到远程主机
  - id: ssh.port
    type: flag
    tier: basic
    invocation: "ssh -p"
    desc: 指定非默认端口连接
  - id: ssh.identity
    type: flag
    tier: intermediate
    invocation: "ssh -i"
    desc: 指定私钥文件登录
  - id: ssh.verbose
    type: flag
    tier: intermediate
    invocation: "ssh -v"
    desc: 输出调试信息，排查连不上的问题
  - id: ssh.config
    type: flag
    tier: intermediate
    invocation: "ssh -F"
    desc: 使用指定的 ssh 配置文件
  - id: ssh.agent-forward
    type: flag
    tier: intermediate
    invocation: "ssh -A"
    desc: 转发本地 SSH agent 到远端
  - id: ssh.local-forward
    type: flag
    tier: advanced
    invocation: "ssh -L"
    desc: 本地端口转发（把远端服务映射到本地）
  - id: ssh.remote-forward
    type: flag
    tier: advanced
    invocation: "ssh -R"
    desc: 远程端口转发（把本地服务暴露到远端）
  - id: ssh.dynamic
    type: flag
    tier: advanced
    invocation: "ssh -D"
    desc: 动态端口转发，建一个 SOCKS 代理
  - id: ssh.jump
    type: flag
    tier: advanced
    invocation: "ssh -J"
    desc: 经跳板机连接到内网主机
  - id: ssh.no-shell
    type: flag
    tier: advanced
    invocation: "ssh -N"
    desc: 只建隧道、不开远程 shell（常配合转发）
